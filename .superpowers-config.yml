# Superpowers Project Configuration
# This file configures default behavior for Superpowers tools in this project

# Default completion action when implementation is complete
# Options: ask (default), pr, merge, keep
default_completion_action: pr

# Target branch for PR or merge
# Default: auto-detects main/master
pr_base_branch: main

# PR title template
pr_title_template: "docs: {{description}}"

# Auto push branch before creating PR
# Default: true
pr_auto_push: true

# Skip confirmation step (only for pr/merge modes)
# Default: false
skip_confirmation: false

# Available options:
# ask    - Always ask user to choose (default behavior)
# pr      - Automatically create Pull Request
# merge   - Automatically merge to main branch
# keep    - Keep branch unchanged
